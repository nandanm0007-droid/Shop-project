<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Reset your Shalimar Atelier account password and regain access to your appointments and exclusive member benefits." />
  <title>Reset Password | SHALIMAR ATELIER</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;0,900;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f2ca50", "primary-container": "#d4af37", "on-primary": "#3c2f00",
            "surface": "#131313", "surface-container": "#201f1f", "surface-container-low": "#1c1b1b",
            "surface-container-high": "#2a2a2a",
            "on-surface": "#e5e2e1", "on-surface-variant": "#d0c5af",
            "outline": "#99907c", "outline-variant": "#4d4635",
            "error": "#ef5350",
          },
          fontFamily: { "notoSerif": ["Noto Serif", "serif"], "manrope": ["Manrope", "sans-serif"] },
        }
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    body {
      min-height: 100dvh;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(1.5rem)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .form-anim {
      animation: fadeInUp 0.6s ease both;
    }

    .auth-input {
      width: 100%;
      background: #1c1b1b;
      border: 1px solid rgba(77, 70, 53, 0.4);
      border-radius: 0.75rem;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      font-family: Manrope, sans-serif;
      font-size: 0.9rem;
      color: #e5e2e1;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      -webkit-appearance: none;
    }

    .auth-input:focus {
      border-color: rgba(242, 202, 80, 0.6);
      box-shadow: 0 0 0 3px rgba(242, 202, 80, 0.08);
    }

    .auth-input::placeholder {
      color: #99907c;
    }

    .auth-input.error {
      border-color: rgba(239, 83, 80, 0.5);
    }

    .field-error {
      font-family: Manrope, sans-serif;
      font-size: 0.75rem;
      color: #ef5350;
      margin-top: 0.375rem;
      display: none;
    }

    .field-error.show {
      display: block;
    }

    .btn-gold {
      background: linear-gradient(135deg, #f2ca50, #d4af37);
      color: #3c2f00;
      transition: box-shadow 0.3s, transform 0.2s;
    }

    .btn-gold:hover {
      box-shadow: 0 0 30px rgba(242, 202, 80, 0.4);
      transform: translateY(-1px);
    }

    .btn-gold:active {
      transform: scale(0.97);
    }

    .btn-gold:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>

<body class="bg-surface text-on-surface font-manrope flex min-h-dvh">

  <!-- Left: Image Panel (Desktop) -->
  <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
    <img
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuBndo90dlZ7J5m3VHKJDJMjcWmtmxP71L8TA0ikKyz06Ek0oZBS70aIWkmmlkfUcbWvGY0GJjX5ZGLNZ1WQ9SitPTGlslwff3Iot5OXkqARA8Y7KAADuqxg5dWCoV9I77iPBjWNaWlVXi5v3HeDLGvxaKsj0p-zlpZIRXt-mXJNlipqIPJEvfTnF8N8wgTBrsPFd55NBZzJ-GNVJ0CRRP8_QF4naQtXTYAMkUQYUJpe3c4QEeymOSp2f8uDVTcpfwaOUg3n1FXgzAM"
      alt="Shalimar Atelier — Professional grooming" class="w-full h-full object-cover grayscale brightness-50" />
    <div class="absolute inset-0 bg-gradient-to-r from-transparent to-surface"></div>
    <div class="absolute inset-0 flex flex-col justify-end p-16">
      <a href="/" class="font-notoSerif text-primary text-2xl font-black tracking-[0.3em] uppercase mb-6">SHALIMAR</a>
      <p class="font-notoSerif text-on-surface text-4xl leading-tight mb-4">Where tradition<br /><span
          class="text-primary italic">meets craft.</span></p>
      <p class="font-manrope text-on-surface-variant text-sm leading-relaxed max-w-xs">
        Choose a new password to regain access to your account.
      </p>
    </div>
  </div>

  <!-- Right: Form Panel -->
  <div class="flex-1 flex flex-col justify-center items-center px-6 py-16 lg:px-16">
    <div class="w-full max-w-sm form-anim">

      <!-- Logo (Mobile) -->
      <a href="/"
        class="lg:hidden block font-notoSerif text-primary text-2xl font-black tracking-[0.3em] uppercase mb-10 text-center">SHALIMAR</a>

      <h1 class="font-notoSerif text-3xl font-bold text-on-surface mb-2">Set new password</h1>
      <p class="font-manrope text-sm text-on-surface-variant mb-10">
        Your new password must be at least 8 characters.
      </p>

      <form id="reset-form" novalidate>
        <!-- New Password -->
        <div class="mb-5">
          <label for="new-password"
            class="block font-manrope text-xs font-bold tracking-widest uppercase text-on-surface-variant mb-2">New
            Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline"
              style="font-size:1.1rem;">lock</span>
            <input type="password" id="new-password" name="new-password" class="auth-input"
              placeholder="Enter new password" autocomplete="new-password" />
            <button type="button" id="toggle-new-password"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors"
              aria-label="Toggle new password visibility">
              <span class="material-symbols-outlined" style="font-size:1.1rem;">visibility</span>
            </button>
          </div>
          <p class="field-error" id="new-password-error">Password must be at least 8 characters.</p>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label for="confirm-password"
            class="block font-manrope text-xs font-bold tracking-widest uppercase text-on-surface-variant mb-2">Confirm
            Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline"
              style="font-size:1.1rem;">lock</span>
            <input type="password" id="confirm-password" name="confirm-password" class="auth-input"
              placeholder="Confirm new password" autocomplete="new-password" />
            <button type="button" id="toggle-confirm-password"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors"
              aria-label="Toggle confirm password visibility">
              <span class="material-symbols-outlined" style="font-size:1.1rem;">visibility</span>
            </button>
          </div>
          <p class="field-error" id="confirm-password-error">Passwords do not match.</p>
        </div>

        <!-- Error banner -->
        <div id="form-error" class="hidden bg-red-500/10 border border-red-500/25 rounded-xl px-4 py-3 mb-6">
          <p class="font-manrope text-sm text-red-400" id="form-error-msg"></p>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn"
          class="btn-gold w-full py-4 rounded-full font-manrope font-bold text-sm tracking-widest uppercase">
          Reset Password
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="font-manrope text-xs text-on-surface-variant/50 tracking-wider">
          Remember your password?
          <a href="/login.html" class="text-on-surface-variant hover:text-primary transition-colors">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/js/theme.js"></script>
  <script type="module">
    import { toast } from '/src/js/toast.js';

    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      window.location.href = '/login.html?toast=Invalid+or+missing+reset+link.&type=error';
    }

    // Toggle new password visibility
    document.getElementById('toggle-new-password').addEventListener('click', () => {
      const input = document.getElementById('new-password');
      const icon = document.querySelector('#toggle-new-password .material-symbols-outlined');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.textContent = isPassword ? 'visibility_off' : 'visibility';
    });

    // Toggle confirm password visibility
    document.getElementById('toggle-confirm-password').addEventListener('click', () => {
      const input = document.getElementById('confirm-password');
      const icon = document.querySelector('#toggle-confirm-password .material-symbols-outlined');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.textContent = isPassword ? 'visibility_off' : 'visibility';
    });

    // Form validation helpers
    function showError(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.classList.add('show'); }
    }
    function clearError(id) {
      const el = document.getElementById(id);
      if (el) el.classList.remove('show');
    }
    function setFormError(msg) {
      const banner = document.getElementById('form-error');
      const msgEl = document.getElementById('form-error-msg');
      if (msg) {
        msgEl.textContent = msg;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }
    }

    // Form submission
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('submit-btn');

      // Clear previous errors
      clearError('new-password-error');
      clearError('confirm-password-error');
      setFormError('');

      let valid = true;

      if (!newPassword || newPassword.length < 8) {
        showError('new-password-error', 'Password must be at least 8 characters.');
        document.getElementById('new-password').classList.add('error');
        valid = false;
      } else {
        document.getElementById('new-password').classList.remove('error');
      }

      if (!confirmPassword || confirmPassword !== newPassword) {
        showError('confirm-password-error', 'Passwords do not match.');
        document.getElementById('confirm-password').classList.add('error');
        valid = false;
      } else {
        document.getElementById('confirm-password').classList.remove('error');
      }

      if (!valid) return;

      // Submit
      btn.disabled = true;
      btn.innerHTML = '<span style="display:flex;align-items:center;justify-content:center;gap:0.5rem;"><span class="material-symbols-outlined" style="font-size:1rem;animation:spin 1s linear infinite;">progress_activity</span> Resetting...</span>';

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: newPassword }),
        });

        const data = await response.json();

        if (response.ok && data.success) {
          toast.success('Your password has been reset successfully.', { title: 'Password Reset', duration: 3000 });
          setTimeout(() => {
            window.location.href = '/login.html?toast=Password+reset+successful.+Please+sign+in.&type=success';
          }, 1200);
        } else {
          setFormError(data.message || 'Something went wrong. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (err) {
        setFormError('Unable to connect. Please check your internet connection and try again.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });

    // Add spin keyframe
    const style = document.createElement('style');
    style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(style);
  </script>
</body>

</html>
