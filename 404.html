<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Shalimar Atelier — Page not found."/>
  <title>404 | SHALIMAR</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;0,900;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: { extend: {
        colors: {
          "primary": "#f2ca50", "primary-container": "#d4af37", "on-primary": "#3c2f00",
          "surface": "#131313", "surface-container": "#201f1f", "surface-container-low": "#1c1b1b",
          "surface-container-high": "#2a2a2a", "surface-container-highest": "#353534",
          "surface-bright": "#393939", "on-surface": "#e5e2e1", "on-surface-variant": "#d0c5af",
          "outline": "#99907c", "outline-variant": "#4d4635",
        },
        fontFamily: { "notoSerif": ["Noto Serif","serif"], "manrope": ["Manrope","sans-serif"] },
      }},
    }
  </script>

  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }

    html { visibility: visible; }

    .grain::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(2rem)} to{opacity:1;transform:translateY(0)} }
    @keyframes gradientShift {
      0%,100%{background-position:0% 50%} 50%{background-position:100% 50%}
    }

    .gradient-text {
      background: linear-gradient(135deg, #f2ca50, #ffe088, #d4af37, #f2ca50);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
    }

    .btn-gold {
      background: linear-gradient(135deg, #f2ca50, #d4af37);
      color: #3c2f00;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }
    .btn-gold:hover {
      box-shadow: 0 0 30px rgba(242,202,80,0.4), 0 0 60px rgba(242,202,80,0.15);
      transform: translateY(-1px);
    }
    .btn-gold:active { transform: scale(0.97); }

    body { min-height: 100dvh; }
  </style>
</head>
<body class="bg-surface text-on-surface font-manrope">

<div class="relative min-h-dvh w-full flex items-center justify-center overflow-hidden grain">
  <!-- Gold glow orbs -->
  <div class="absolute top-1/4 left-1/3 w-80 h-80 bg-primary/5 rounded-full blur-3xl pointer-events-none" style="animation:floatY 8s ease-in-out infinite;"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary/3 rounded-full blur-3xl pointer-events-none" style="animation:floatY 10s ease-in-out infinite reverse;"></div>

  <!-- Theme Toggle -->
  <div class="absolute top-6 right-6 z-20">
    <button data-theme-toggle class="w-9 h-9 rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary hover:bg-surface-container-high transition-all" aria-label="Toggle theme">
      <span class="material-symbols-outlined" style="font-size:1.25rem;">light_mode</span>
    </button>
  </div>

  <!-- Content -->
  <div class="relative z-10 text-center px-6 max-w-2xl" style="animation:fadeInUp 0.8s ease both;">
    <p class="font-notoSerif text-[8rem] md:text-[10rem] lg:text-[12rem] font-black leading-none text-primary mb-2 tracking-tighter">
      404
    </p>
    <h1 class="font-notoSerif text-3xl md:text-4xl text-on-surface mb-6 tracking-tight">
      Page Not Found
    </h1>
    <p class="text-on-surface-variant text-base md:text-lg max-w-md mx-auto mb-10 font-light leading-relaxed">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/" class="btn-gold inline-flex items-center gap-2 px-10 py-4 rounded-full font-manrope font-bold uppercase tracking-[0.2em] text-sm shadow-2xl">
      <span class="material-symbols-outlined" style="font-size:1rem;">arrow_back</span>
      Return Home
    </a>
  </div>
</div>

<script type="module" src="/src/js/theme.js"></script>
</body>
</html>
